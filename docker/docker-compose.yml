version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-arena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiz_arena
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quiz-network

  redis:
    image: redis:7-alpine
    container_name: quiz-arena-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
