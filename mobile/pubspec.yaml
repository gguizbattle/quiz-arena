name: quiz_arena
description: Quiz Arena - Compete, Learn, Win
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # Realtime
  socket_io_client: ^3.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.1
  retrofit_generator: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
